<script>
  (function () {
    const BACKEND = "https://orderinme.fvds.ru";
    const OZON_PICKUP_ID = "1655508112";
    const OZON_COURIER_ID = "2127610442";

    function waitFor(getter, cb, ms = 200, max = 75) {
      let n = 0;
      const t = setInterval(() => {
        const val = getter();
        if (val) {
          clearInterval(t);
          cb(val);
        }
        if (++n >= max) clearInterval(t);
      }, ms);
    }

    let pendingMapToken = null;
    let searchDebounce = null;
    let courierDebounce = null;

    // ==============================================
    // STATE MACHINE — готовность к покупке
    // ==============================================
    const ozonState = {
      phoneChecked: false,
      phoneValid: false,
      phoneTouched: false, // пользователь уже взаимодействовал с полем телефона
      deliverySelected: false,
      checkoutPassed: false,
      deliveryType: null, // "pickup" | "courier" | null
    };

    function getErrorMessage() {
      if (!ozonState.phoneTouched) return ""; // не показываем ошибку пока не трогали телефон
      if (!ozonState.phoneValid) return "Введите номер телефона";
      if (!ozonState.phoneChecked)
        return "Доставка Ozon недоступна для этого номера";
      if (!ozonState.deliverySelected)
        return "Выберите пункт выдачи или введите адрес доставки";
      if (!ozonState.checkoutPassed)
        return "Доставка недоступна для выбранных товаров";
      return "";
    }

    function showOzonError(message) {
      if (!message) return hideOzonError();
      if (
        window.tcart__errorHandler &&
        typeof window.tcart__errorHandler.show === "function"
      ) {
        window.tcart__errorHandler.show(message);
      }
    }

    function hideOzonError() {
      if (
        window.tcart__errorHandler &&
        typeof window.tcart__errorHandler.hide === "function"
      ) {
        window.tcart__errorHandler.hide();
      }
    }

    function updatePurchaseButton() {
      const canPurchase =
        ozonState.phoneTouched &&
        ozonState.phoneChecked &&
        ozonState.deliverySelected &&
        ozonState.checkoutPassed;
      if (canPurchase) {
        if (typeof window.tcart__unblockSubmitButton === "function") {
          window.tcart__unblockSubmitButton();
        }
        hideOzonError();
      } else {
        if (typeof window.tcart__blockSubmitButton === "function") {
          window.tcart__blockSubmitButton();
        }
        showOzonError(getErrorMessage());
      }
    }

    /**
     * Получает items корзины в формате для API
     */
    function getCartItems() {
      const products = window.tcart.products || [];
      console.log(
        "[OzonPatch] Raw cart products:",
        JSON.stringify(
          products.map((p) => ({
            name: p.name,
            sku: p.sku,
            externalid: p.externalid,
            uid: p.uid,
            options: p.options,
            quantity: p.quantity,
          })),
        ),
      );
      return products
        .map((p) => {
          const skuRaw = (p.sku || p.externalid || "").toString().trim();
          const skuNum = parseInt(skuRaw, 10);
          return {
            sku: isNaN(skuNum) ? undefined : skuNum,
            quantity: parseInt(p.quantity) || 1,
          };
        })
        .filter((p) => p.sku);
    }

    /**
     * Получает телефон покупателя
     */
    function getPhone() {
      return (
        document
          .querySelector('input[name="phone"]')
          ?.value.replace(/\D/g, "") || ""
      );
    }

    /**
     * Устанавливает hidden input для передачи через webhook
     */
    function setHiddenInput(name, value) {
      let input = document.querySelector(`.t706 [name="${name}"]`);
      if (!input) {
        input = document.createElement("input");
        input.type = "hidden";
        input.name = name;
        const form = document.querySelector(".t706 form");
        if (form) form.appendChild(input);
      }
      input.value = value;
    }

    /**
     * Расчёт цены доставки Ozon (ПВЗ)
     */
    async function updateOzonPrice(serviceId, mapPointId) {
      if (!mapPointId) return;
      ozonState.checkoutPassed = false;
      updatePurchaseButton();
      if (window.tcart__preloader) window.tcart__preloader.show();
      try {
        const res = await fetch(`${BACKEND}/v1/delivery/price`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            mapPointId: parseInt(mapPointId),
            items: getCartItems(),
            buyerPhone: getPhone(),
          }),
        });
        const data = await res.json();
        if (data.success) {
          ozonState.checkoutPassed = true;
          const service =
            window.tcart_newDelivery.deliveryState.services[serviceId];
          if (service) {
            if (data.total_price) service.price = data.total_price.value;
            if (data.delivery_date) service.days = data.delivery_date;
            if (data.daysMin !== undefined && data.daysMax !== undefined) {
              service.days = `${data.daysMin}-${data.daysMax} дн.`;
            }
            if (
              typeof window.tcart__updateTotalProductsinCartObj === "function"
            ) {
              tcart__updateTotalProductsinCartObj();
            }
          }
        } else {
          ozonState.checkoutPassed = false;
          console.warn("[OzonPatch] Checkout failed:", data.error || data);
        }
      } catch (e) {
        ozonState.checkoutPassed = false;
        console.warn("[OzonPatch] Price error:", e);
      } finally {
        updatePurchaseButton();
        if (window.tcart__preloader) window.tcart__preloader.hide();
      }
    }

    /**
     * Расчёт цены курьерской доставки Ozon
     */
    async function updateCourierPrice(serviceId, lat, lng) {
      if (!lat || !lng) return;
      ozonState.checkoutPassed = false;
      updatePurchaseButton();
      if (window.tcart__preloader) window.tcart__preloader.show();
      try {
        const res = await fetch(`${BACKEND}/v1/delivery/courier/price`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            latitude: lat,
            longitude: lng,
            items: getCartItems(),
            buyerPhone: getPhone(),
          }),
        });
        const data = await res.json();
        if (data.success) {
          ozonState.checkoutPassed = true;
          const service =
            window.tcart_newDelivery.deliveryState.services[serviceId];
          if (service) {
            if (data.daysMin !== undefined && data.daysMax !== undefined) {
              service.days = `${data.daysMin}-${data.daysMax} дн.`;
            }
            if (
              typeof window.tcart__updateTotalProductsinCartObj === "function"
            ) {
              tcart__updateTotalProductsinCartObj();
            }
          }
        } else {
          ozonState.checkoutPassed = false;
          console.warn("[OzonPatch] Courier price unavailable:", data.error);
        }
      } catch (e) {
        ozonState.checkoutPassed = false;
        console.warn("[OzonPatch] Courier price error:", e);
      } finally {
        updatePurchaseButton();
        if (window.tcart__preloader) window.tcart__preloader.hide();
      }
    }

    /**
     * Геокодинг адреса через бэкенд (Яндекс Геокодер)
     */
    async function geocodeAndUpdateCourier(address) {
      if (!address || address.trim().length < 5) {
        ozonState.deliverySelected = false;
        ozonState.checkoutPassed = false;
        updatePurchaseButton();
        return;
      }
      ozonState.checkoutPassed = false;
      updatePurchaseButton();
      try {
        const res = await fetch(`${BACKEND}/v1/delivery/geocode`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ address }),
        });
        const data = await res.json();
        if (data.success && data.lat && data.lon) {
          const lat = data.lat;
          const lon = data.lon;
          console.log(`[OzonPatch] Geocoded "${address}" → ${lat}, ${lon}`);

          // Сохраняем координаты и тип доставки
          setHiddenInput("ozon_delivery_type", "courier");
          setHiddenInput("ozon_map_point_id", "");
          setHiddenInput("ozon_courier_lat", String(lat));
          setHiddenInput("ozon_courier_lon", String(lon));

          ozonState.deliverySelected = true;
          ozonState.deliveryType = "courier";
          updatePurchaseButton();
          updateCourierPrice(OZON_COURIER_ID, lat, lon);
        } else {
          console.warn(`[OzonPatch] Geocode failed for: "${address}"`);
          ozonState.deliverySelected = false;
          ozonState.checkoutPassed = false;
          updatePurchaseButton();
          showOzonError(
            "Не удалось определить адрес. Проверьте правильность ввода.",
          );
        }
      } catch (e) {
        console.warn("[OzonPatch] Geocode error:", e);
        ozonState.deliverySelected = false;
        ozonState.checkoutPassed = false;
        updatePurchaseButton();
        showOzonError("Ошибка при определении адреса. Попробуйте ещё раз.");
      }
    }

    /**
     * Обновляет deliveryState.pickupList — merge точек без дублирования по id.
     * КРИТИЧЕСКИ ВАЖНО: showPickupInfo ищет точку в pickupList.find(e => e.id == t).
     * Без этого "окошко выбора" не появится.
     */
    function mergePickupList(delivery, newPoints) {
      const existing = delivery.deliveryState.pickupList || [];
      const map = new Map();
      for (const p of existing) map.set(String(p.id), p);
      for (const p of newPoints) map.set(String(p.id), p);
      delivery.deliveryState.pickupList = Array.from(map.values());
    }

    /**
     * Загрузка точек для текущего viewport карты.
     * Вызывается при перемещении/зуме карты.
     */
    async function loadPointsForViewport(map, delivery) {
      const zoom = map.getZoom();
      if (zoom < 10) return;

      const bounds = map.getBounds();
      const token = Symbol();
      pendingMapToken = token;

      try {
        const res = await fetch(`${BACKEND}/v1/delivery/map`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            viewport: {
              left_bottom: { lat: bounds[0][0], long: bounds[0][1] },
              right_top: { lat: bounds[1][0], long: bounds[1][1] },
            },
            zoom,
          }),
        });

        if (pendingMapToken !== token) return;
        const points = await res.json();

        // --- КРИТИЧЕСКОЕ: обновляем pickupList для showPickupInfo ---
        mergePickupList(delivery, points);

        // Обновляем autocompleteAddress для поиска по тексту
        const sb = document.getElementById("pickup-searchbox");
        if (sb) {
          const sbId = sb.getAttribute("id");
          if (!delivery.deliveryState.searchboxes[sbId])
            delivery.deliveryState.searchboxes[sbId] = {};
          // Merge — точки из разных viewport'ов
          const existing =
            delivery.deliveryState.searchboxes[sbId].autocompleteAddress || [];
          const map2 = new Map();
          for (const p of existing) map2.set(String(p.id), p);
          for (const p of points) map2.set(String(p.id), p);
          delivery.deliveryState.searchboxes[sbId].autocompleteAddress =
            Array.from(map2.values());
        }

        // Ищем ПРАВИЛЬНЫЙ wrapper — pickup-searchbox!
        // Это важно: внутри mapAddPoints → tcart__chosePointOnMap
        // вызывается n.querySelector(".searchbox-input")
        let deliveryWrapper =
          document.getElementById("pickup-searchbox") ||
          document.getElementById("customdelivery") ||
          document.querySelector(".t-radio__wrapper-delivery");

        if (!deliveryWrapper) {
          console.error("[OzonPatch] Не удалось найти контейнер доставки");
          return;
        }

        // Отключаем прыжки камеры
        const originalSetBounds = map.setBounds;
        map.setBounds = function () {
          return Promise.resolve();
        };

        // Сносим старые точки с карты перед добавлением новых
        const geoObjects = map.geoObjects;
        if (geoObjects) {
          geoObjects.removeAll();
        }

        // Вызываем метод Тильды для добавления точек на карту
        delivery.mapAddPoints(null, points, deliveryWrapper);

        // Возвращаем штатный метод
        setTimeout(() => {
          map.setBounds = originalSetBounds;
        }, 150);
      } catch (e) {
        console.warn("[OzonPatch] Ошибка загрузки точек:", e);
      }
    }

    waitFor(
      () => window.tcart_newDelivery,
      (delivery) => {
        // ==============================================
        // 1. ПАТЧ changePickupHandler
        // Вызывается из:
        //   - tcart__chosePointOnMap (клик на карте)
        //   - choseSearchListItemHandler (клик в выпадающем списке)
        // Заменяет сломанные патчи selectPickupPoint (#2 и #5)
        // ==============================================
        const origChangePickup = delivery.changePickupHandler;
        delivery.changePickupHandler = function (
          pointId,
          name,
          postalCode,
          wrapper,
          address,
          coords,
        ) {
          // Оригинал: обновит input value, postalCode, вызовет updateDeliveryPrice
          origChangePickup.apply(this, arguments);

          // Сохраняем Ozon map_point_id и тип доставки в hidden inputs
          setHiddenInput("ozon_map_point_id", pointId || "");
          setHiddenInput("ozon_delivery_type", "pickup");

          // Заполняем скрытые инпуты формы Тильды
          const nameInput = document.querySelector(
            '.t706 [name="tildadelivery-pickup-name"]',
          );
          const addrInput = document.querySelector(
            '.t706 [name="tildadelivery-pickup-address"]',
          );

          if (nameInput && name) {
            nameInput.value = name;
            nameInput.dispatchEvent(new Event("input", { bubbles: true }));
            nameInput.dispatchEvent(new Event("change", { bubbles: true }));
          }
          if (addrInput && address) {
            addrInput.value = address;
            addrInput.dispatchEvent(new Event("input", { bubbles: true }));
            addrInput.dispatchEvent(new Event("change", { bubbles: true }));
          }

          // Принудительно сохраняем корзину
          if (typeof window.tcart__cart_save === "function") {
            window.tcart__cart_save();
          }

          // Обновляем state
          ozonState.deliverySelected = !!pointId;
          ozonState.deliveryType = "pickup";
          updatePurchaseButton();

          // Расчёт цены Ozon
          updateOzonPrice(OZON_PICKUP_ID, pointId);
        };

        // ==============================================
        // 2. ПАТЧ ПОИСКА — changeSearchboxInputHandler
        // ==============================================
        const origSearch = delivery.changeSearchboxInputHandler;
        delivery.changeSearchboxInputHandler = function (t, r, n) {
          const input = r ? r.querySelector(".searchbox-input") : null;
          const sbId = r ? r.getAttribute("id") : null;

          // Для pickup — перехватываем поиск полностью
          if (n !== "pickup" || input?.value.trim().length < 3)
            return origSearch.apply(this, arguments);

          clearTimeout(searchDebounce);
          searchDebounce = setTimeout(() => {
            fetch(
              `${BACKEND}/v1/delivery/pvz?q=${encodeURIComponent(input.value)}`,
            )
              .then((resp) => resp.json())
              .then((data) => {
                const points = data.pvz || [];

                // Снимаем loading-состояние
                r.classList.remove("load");
                input.readOnly = false;

                if (points.length === 0) {
                  const listEl = r.querySelector(".searchbox-list");
                  if (listEl) {
                    listEl.innerHTML =
                      '<div class="searchbox-list-item t-text" style="user-select: none; pointer-events: none;">Ничего не найдено</div>';
                  }
                  return;
                }

                // --- КРИТИЧЕСКОЕ: обновляем стейт ---
                // 1. autocompleteAddress — для локальной фильтрации при следующем вводе
                if (!this.deliveryState.searchboxes[sbId])
                  this.deliveryState.searchboxes[sbId] = {};
                this.deliveryState.searchboxes[sbId].autocompleteAddress =
                  points;

                // 2. searchList — для поиска точки по id при клике
                this.searchList = points;

                // 3. pickupList — для showPickupInfo (окошко выбора)
                mergePickupList(this, points);

                // Заполняем список и навешиваем обработчики клика
                const listEl = r.querySelector(".searchbox-list");
                this.fillSearchList(listEl, points, "pickup");
                this.choseSearchListItemHandler(r, n);
              })
              .catch((err) => {
                console.warn("[OzonPatch] Search error:", err);
                r.classList.remove("load");
                input.readOnly = false;
              });
          }, 400);
        };

        // ==============================================
        // 3. ЗАГЛУШКА getPickupList
        // Чтобы Тильда не грузила ПВЗ через свой API
        // ==============================================
        delivery.getPickupList = (p) => {
          // Первый вызов при инициализации — без pattern
          if (!("pattern" in p)) {
            // Возвращаем пустой массив, чтобы рендер прошёл,
            // но сами ПВЗ будем грузить через loadPointsForViewport
            p.onDone([]);
          }
          // Вызовы с pattern (поиск) — игнорируем,
          // поиск перехвачен в патче changeSearchboxInputHandler
        };

        // ==============================================
        // 4. ПАТЧ ИНИЦИАЛИЗАЦИИ КАРТЫ
        // ==============================================
        const origMapInit = delivery.mapInit;
        delivery.mapInit = function (...args) {
          const res = origMapInit.apply(this, args);
          waitFor(
            () => window.t_delivery__map,
            (map) => {
              map.events.add("boundschange", () => {
                clearTimeout(searchDebounce);
                searchDebounce = setTimeout(
                  () => loadPointsForViewport(map, delivery),
                  700,
                );
              });
              // Первая загрузка точек
              loadPointsForViewport(map, delivery);
            },
          );
          return res;
        };

        // ==============================================
        // 5. ПРОВЕРКА ТЕЛЕФОНА
        // Используем Тильдовский hidden input js-phonemask-result
        // который содержит чистый номер после маски
        // ==============================================
        let phoneCheckDebounce = null;
        let lastCheckedPhone = "";

        async function checkPhoneWithOzon(phone) {
          if (phone === lastCheckedPhone && ozonState.phoneChecked) return;
          lastCheckedPhone = phone;

          try {
            const res = await fetch(`${BACKEND}/v1/delivery/check`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ client_phone: phone }),
            });
            const d = await res.json();
            ozonState.phoneChecked = d.is_possible === true;
          } catch (err) {
            console.warn("[OzonPatch] Phone check error:", err);
            ozonState.phoneChecked = false;
          }
          updatePurchaseButton();

          // После успешного check — перезапускаем checkout если доставка уже выбрана
          if (ozonState.phoneChecked && ozonState.deliverySelected) {
            rerunCheckout();
          }
        }

        /**
         * Перезапуск checkout с текущими параметрами доставки
         * Нужен при смене телефона — checkout зависит от buyerPhone
         */
        function rerunCheckout() {
          if (ozonState.deliveryType === "pickup") {
            const mapPointId = document.querySelector(
              '.t706 [name="ozon_map_point_id"]',
            )?.value;
            if (mapPointId) {
              updateOzonPrice(OZON_PICKUP_ID, mapPointId);
            }
          } else if (ozonState.deliveryType === "courier") {
            // Для курьера нужно перегеокодить адрес → он сам вызовет updateCourierPrice
            const addrInput =
              document.querySelector(
                '.t706 input[name="tildadelivery-address"]',
              ) ||
              document.querySelector('.t706 input[name="delivery_address"]') ||
              document.querySelector(".t706 .t-input-group_da input");
            if (addrInput?.value) {
              geocodeAndUpdateCourier(addrInput.value);
            }
          }
        }

        function handlePhoneChange() {
          ozonState.phoneTouched = true;

          // Пробуем Тильдовский hidden input с чистым номером (приоритет)
          const phoneMaskInput = document.querySelector(
            ".t706 .js-phonemask-result",
          );
          let phone = "";
          if (phoneMaskInput && phoneMaskInput.value) {
            phone = phoneMaskInput.value.replace(/\D/g, "");
          } else {
            // Фоллбэк — обычное поле phone
            const phoneInput = document.querySelector(
              '.t706 input[name="phone"]',
            );
            if (phoneInput) phone = phoneInput.value.replace(/\D/g, "");
          }

          // Нормализуем: 8xxx → 7xxx
          if (phone.startsWith("8") && phone.length === 11) {
            phone = "7" + phone.slice(1);
          }

          const isValid = phone.length === 11 && phone.startsWith("7");
          ozonState.phoneValid = isValid;

          if (isValid) {
            // Телефон валиден по маске — делаем запрос check с дебаунсом
            ozonState.checkoutPassed = false; // сбрасываем checkout — будет перезапущен после check
            clearTimeout(phoneCheckDebounce);
            phoneCheckDebounce = setTimeout(
              () => checkPhoneWithOzon(phone),
              600,
            );
          } else {
            ozonState.phoneChecked = false;
            ozonState.checkoutPassed = false;
            lastCheckedPhone = "";
          }
          updatePurchaseButton();
        }

        // Слушаем input на поле телефона (работает с маской Тильды)
        document.body.addEventListener(
          "input",
          (e) => {
            const el = e.target;
            if (
              el.name === "phone" ||
              el.classList.contains("js-phonemask-result") ||
              el.name?.startsWith("tildaspec-phone")
            ) {
              handlePhoneChange();
            }
          },
          true,
        );

        // На blur тоже проверяем (финальная проверка после маски)
        document.body.addEventListener(
          "blur",
          (e) => {
            if (
              e.target.name === "phone" ||
              e.target.classList.contains("js-phonemask-result")
            ) {
              handlePhoneChange();
            }
          },
          true,
        );

        // MutationObserver на js-phonemask-result (Тильда обновляет value программно)
        waitFor(
          () => document.querySelector(".t706 .js-phonemask-result"),
          (phoneMaskEl) => {
            const phoneObserver = new MutationObserver(() =>
              handlePhoneChange(),
            );
            phoneObserver.observe(phoneMaskEl, {
              attributes: true,
              attributeFilter: ["value"],
            });
            // Также перехватываем value setter
            const desc = Object.getOwnPropertyDescriptor(
              HTMLInputElement.prototype,
              "value",
            );
            if (desc && desc.set) {
              const origSet = desc.set;
              Object.defineProperty(phoneMaskEl, "value", {
                get: desc.get,
                set(val) {
                  origSet.call(this, val);
                  handlePhoneChange();
                },
                configurable: true,
              });
            }
          },
        );

        // Блокируем кнопку при инициализации
        updatePurchaseButton();

        // Проверяем предзаполненный телефон из ЛК Тильды
        setTimeout(() => {
          const phoneMaskInput = document.querySelector(
            ".t706 .js-phonemask-result",
          );
          const phoneInput = document.querySelector('.t706 [name="phone"]');
          const prefilled =
            (phoneMaskInput && phoneMaskInput.value) ||
            (phoneInput && phoneInput.value) ||
            "";
          if (prefilled.replace(/\D/g, "").length >= 10) {
            console.log(
              "[OzonPatch] Предзаполненный телефон найден:",
              prefilled,
            );
            handlePhoneChange();
          }
        }, 1000);

        console.log(
          "[OzonPatch] V5 — ПВЗ + курьер + блокировка + cart observer ✓",
        );

        // ==============================================
        // 6. CART POLLING — агрессивная проверка корзины каждую секунду
        // Если товар добавлен/удалён/изменено количество — сброс и перезапрос price
        // Если checkout не пройден — повторяем запрос пока не пройдёт или корзина пуста
        // ==============================================
        let cartSnapshotJson = JSON.stringify(getCartItems());
        let checkoutInFlight = false;

        setInterval(() => {
          const items = getCartItems();
          const newSnapshot = JSON.stringify(items);
          const cartChanged = newSnapshot !== cartSnapshotJson;

          if (cartChanged) {
            cartSnapshotJson = newSnapshot;
            console.log("[OzonPatch] Корзина изменилась, сброс checkout");
            ozonState.checkoutPassed = false;
            updatePurchaseButton();
          }

          // Если корзина пуста — нечего проверять
          if (items.length === 0) return;

          // Если телефон не проверен, но введён — перезапускаем проверку
          if (!ozonState.phoneChecked && ozonState.phoneValid) {
            lastCheckedPhone = "";
            handlePhoneChange();
            return;
          }

          // Если checkout не пройден и доставка выбрана и телефон ок — перезапускаем
          if (
            !ozonState.checkoutPassed &&
            ozonState.phoneChecked &&
            ozonState.deliverySelected &&
            !checkoutInFlight
          ) {
            console.log("[OzonPatch] Polling: checkout не пройден, перезапуск");
            checkoutInFlight = true;
            const done = () => {
              checkoutInFlight = false;
            };
            // Обёртка rerunCheckout с отслеживанием завершения
            if (ozonState.deliveryType === "pickup") {
              const mapPointId = document.querySelector(
                '.t706 [name="ozon_map_point_id"]',
              )?.value;
              if (mapPointId) {
                updateOzonPrice(OZON_PICKUP_ID, mapPointId).finally(done);
              } else {
                done();
              }
            } else if (ozonState.deliveryType === "courier") {
              const lat = document.querySelector(
                '.t706 [name="ozon_courier_lat"]',
              )?.value;
              const lon = document.querySelector(
                '.t706 [name="ozon_courier_lon"]',
              )?.value;
              if (lat && lon) {
                updateCourierPrice(
                  OZON_COURIER_ID,
                  parseFloat(lat),
                  parseFloat(lon),
                ).finally(done);
              } else {
                done();
              }
            } else {
              done();
            }
          }
        }, 1000);

        // ==============================================
        // 7. КУРЬЕРСКАЯ ДОСТАВКА
        // При выборе курьерской службы и вводе адреса → геокодинг → цена
        // ==============================================

        // Отслеживаем переключение на курьерскую доставку
        function watchCourierAddress() {
          // Собирает полный адрес из полей Тильды
          function collectCourierAddress() {
            const city =
              document.querySelector('input[name="tildadelivery-city"]')
                ?.value || "";
            const street =
              document.querySelector('input[name="tildadelivery-street"]')
                ?.value || "";
            const house =
              document.querySelector('input[name="tildadelivery-house"]')
                ?.value || "";
            const addr =
              document.querySelector('input[name="tildadelivery-address"]')
                ?.value ||
              document.querySelector('input[name="delivery_address"]')?.value ||
              "";
            return addr || [city, street, house].filter(Boolean).join(", ");
          }

          function triggerCourierGeocode() {
            const activeService = delivery.deliveryState.selectedService;
            if (activeService !== OZON_COURIER_ID) return;
            clearTimeout(courierDebounce);
            courierDebounce = setTimeout(() => {
              const fullAddress = collectCourierAddress();
              if (fullAddress.length >= 5) {
                console.log(
                  "[OzonPatch] Courier geocode trigger:",
                  fullAddress,
                );
                geocodeAndUpdateCourier(fullAddress);
              }
            }, 800);
          }

          // Слушаем изменения в полях адреса курьерской доставки
          const addressSelectors = [
            'input[name="tildadelivery-address"]',
            'input[name="delivery_address"]',
            'input[name="tildadelivery-city"]',
            'input[name="tildadelivery-street"]',
            'input[name="tildadelivery-house"]',
            ".t-input-group_da input",
          ];

          for (const sel of addressSelectors) {
            const inputs = document.querySelectorAll(sel);
            inputs.forEach((input) => {
              if (input.dataset.ozonCourierBound) return;
              input.dataset.ozonCourierBound = "1";

              // blur — основной триггер
              input.addEventListener("blur", triggerCourierGeocode);

              // input с дебаунсом — ловим ввод и программные изменения
              input.addEventListener("input", triggerCourierGeocode);

              // change — ловим autocomplete и программные setValue
              input.addEventListener("change", triggerCourierGeocode);
            });
          }
        }

        // Делегированный обработчик на body — ловит ввод в адресные поля
        // даже если они ещё не существовали при инициализации
        document.body.addEventListener(
          "input",
          (e) => {
            const el = e.target;
            if (
              el.name === "tildadelivery-address" ||
              el.name === "delivery_address" ||
              el.name === "tildadelivery-city" ||
              el.name === "tildadelivery-street" ||
              el.name === "tildadelivery-house"
            ) {
              const activeService = delivery.deliveryState.selectedService;
              if (activeService === OZON_COURIER_ID) {
                clearTimeout(courierDebounce);
                courierDebounce = setTimeout(() => {
                  watchCourierAddress(); // биндим если ещё не привязаны
                  const fullAddress = (function () {
                    const city =
                      document.querySelector('input[name="tildadelivery-city"]')
                        ?.value || "";
                    const street =
                      document.querySelector(
                        'input[name="tildadelivery-street"]',
                      )?.value || "";
                    const house =
                      document.querySelector(
                        'input[name="tildadelivery-house"]',
                      )?.value || "";
                    const addr =
                      document.querySelector(
                        'input[name="tildadelivery-address"]',
                      )?.value ||
                      document.querySelector('input[name="delivery_address"]')
                        ?.value ||
                      "";
                    return (
                      addr || [city, street, house].filter(Boolean).join(", ")
                    );
                  })();
                  if (fullAddress.length >= 5) {
                    geocodeAndUpdateCourier(fullAddress);
                  }
                }, 1200);
              }
            }
          },
          true,
        );

        // Отслеживаем переключение типа доставки (radio кнопки)
        const courierDomObserver = new MutationObserver(() => {
          watchCourierAddress();
        });
        const cartContainer =
          document.querySelector(".t706") ||
          document.querySelector(".t-store__cart");
        if (cartContainer) {
          courierDomObserver.observe(cartContainer, {
            childList: true,
            subtree: true,
          });
        }

        // Перехватываем выбор службы доставки
        const origSelectService = delivery.selectDeliveryService;
        if (origSelectService) {
          delivery.selectDeliveryService = function () {
            origSelectService.apply(this, arguments);

            const activeService = this.deliveryState.selectedService;
            if (activeService === OZON_COURIER_ID) {
              setHiddenInput("ozon_delivery_type", "courier");
              setHiddenInput("ozon_map_point_id", "");
              ozonState.deliverySelected = false;
              ozonState.deliveryType = "courier";
              ozonState.checkoutPassed = false;
              updatePurchaseButton();

              // Биндим поля + пробуем геокодить уже введённый адрес
              setTimeout(() => {
                watchCourierAddress();
                const fullAddress = (function () {
                  const city =
                    document.querySelector('input[name="tildadelivery-city"]')
                      ?.value || "";
                  const street =
                    document.querySelector('input[name="tildadelivery-street"]')
                      ?.value || "";
                  const house =
                    document.querySelector('input[name="tildadelivery-house"]')
                      ?.value || "";
                  const addr =
                    document.querySelector(
                      'input[name="tildadelivery-address"]',
                    )?.value ||
                    document.querySelector('input[name="delivery_address"]')
                      ?.value ||
                    "";
                  return (
                    addr || [city, street, house].filter(Boolean).join(", ")
                  );
                })();
                if (fullAddress.length >= 5) {
                  geocodeAndUpdateCourier(fullAddress);
                }
              }, 300);

              // Если телефон не проверен — запускаем проверку
              if (!ozonState.phoneChecked && ozonState.phoneValid) {
                lastCheckedPhone = "";
                handlePhoneChange();
              }
            } else {
              // Переключились на ПВЗ — сбрасываем выбор
              ozonState.deliverySelected = false;
              ozonState.deliveryType = null;
              ozonState.checkoutPassed = false;
              updatePurchaseButton();
            }
          };
        }
      },
    );
  })();
</script>
