<script>
  (function () {
    const BACKEND = "https://orderinme.fvds.ru";
    const OZON_PICKUP_ID = "1655508112";
    const OZON_COURIER_ID = "2127610442";

    function waitFor(getter, cb, ms = 200, max = 75) {
      let n = 0;
      const t = setInterval(() => {
        const val = getter();
        if (val) {
          clearInterval(t);
          cb(val);
        }
        if (++n >= max) clearInterval(t);
      }, ms);
    }

    let pendingMapToken = null;
    let searchDebounce = null;
    let courierDebounce = null;

    // ==============================================
    // STATE MACHINE — готовность к покупке
    // ==============================================
    const ozonState = {
      phoneChecked: false,
      phoneValid: false,
      deliverySelected: false,
      deliveryType: null, // "pickup" | "courier" | null
    };

    function getErrorMessage() {
      if (!ozonState.phoneValid) return "Введите номер телефона";
      if (!ozonState.phoneChecked)
        return "Доставка Ozon недоступна для этого номера";
      if (!ozonState.deliverySelected)
        return "Выберите пункт выдачи или введите адрес доставки";
      return "";
    }

    function showOzonError(message) {
      if (!message) return hideOzonError();
      if (
        window.tcart__errorHandler &&
        typeof window.tcart__errorHandler.show === "function"
      ) {
        window.tcart__errorHandler.show(message);
      }
    }

    function hideOzonError() {
      if (
        window.tcart__errorHandler &&
        typeof window.tcart__errorHandler.hide === "function"
      ) {
        window.tcart__errorHandler.hide();
      }
    }

    function updatePurchaseButton() {
      const canPurchase = ozonState.phoneChecked && ozonState.deliverySelected;
      if (canPurchase) {
        if (typeof window.tcart__unblockSubmitButton === "function") {
          window.tcart__unblockSubmitButton();
        }
        hideOzonError();
      } else {
        if (typeof window.tcart__blockSubmitButton === "function") {
          window.tcart__blockSubmitButton();
        }
        showOzonError(getErrorMessage());
      }
    }

    /**
     * Получает items корзины в формате для API
     */
    function getCartItems() {
      return (window.tcart.products || [])
        .map((p) => {
          const offerId = (p.sku || "").toString().trim();
          return {
            offer_id: offerId,
            quantity: parseInt(p.quantity) || 1,
          };
        })
        .filter((p) => p.offer_id !== "");
    }

    /**
     * Получает телефон покупателя
     */
    function getPhone() {
      return (
        document
          .querySelector('input[name="phone"]')
          ?.value.replace(/\D/g, "") || ""
      );
    }

    /**
     * Устанавливает hidden input для передачи через webhook
     */
    function setHiddenInput(name, value) {
      let input = document.querySelector(`.t706 [name="${name}"]`);
      if (!input) {
        input = document.createElement("input");
        input.type = "hidden";
        input.name = name;
        const form = document.querySelector(".t706 form");
        if (form) form.appendChild(input);
      }
      input.value = value;
    }

    /**
     * Расчёт цены доставки Ozon (ПВЗ)
     */
    async function updateOzonPrice(serviceId, mapPointId) {
      if (!mapPointId) return;
      if (window.tcart__preloader) window.tcart__preloader.show();
      try {
        const res = await fetch(`${BACKEND}/v1/delivery/price`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            mapPointId: parseInt(mapPointId),
            items: getCartItems(),
            buyerPhone: getPhone(),
          }),
        });
        const data = await res.json();
        if (data.success) {
          const service =
            window.tcart_newDelivery.deliveryState.services[serviceId];
          if (service) {
            if (data.total_price) service.price = data.total_price.value;
            if (data.delivery_date) service.days = data.delivery_date;
            if (data.daysMin !== undefined && data.daysMax !== undefined) {
              service.days = `${data.daysMin}-${data.daysMax} дн.`;
            }
            window.tcart__updateTotal();
          }
        }
      } catch (e) {
        console.warn("[OzonPatch] Price error:", e);
      } finally {
        if (window.tcart__preloader) window.tcart__preloader.hide();
      }
    }

    /**
     * Расчёт цены курьерской доставки Ozon
     */
    async function updateCourierPrice(serviceId, lat, lng) {
      if (!lat || !lng) return;
      if (window.tcart__preloader) window.tcart__preloader.show();
      try {
        const res = await fetch(`${BACKEND}/v1/delivery/courier/price`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            latitude: lat,
            longitude: lng,
            items: getCartItems(),
            buyerPhone: getPhone(),
          }),
        });
        const data = await res.json();
        if (data.success) {
          const service =
            window.tcart_newDelivery.deliveryState.services[serviceId];
          if (service) {
            if (data.daysMin !== undefined && data.daysMax !== undefined) {
              service.days = `${data.daysMin}-${data.daysMax} дн.`;
            }
            window.tcart__updateTotal();
          }
        } else {
          console.warn("[OzonPatch] Courier price unavailable:", data.error);
        }
      } catch (e) {
        console.warn("[OzonPatch] Courier price error:", e);
      } finally {
        if (window.tcart__preloader) window.tcart__preloader.hide();
      }
    }

    /**
     * Геокодинг адреса через серверный endpoint
     * Используем Nominatim через backend
     */
    async function geocodeAndUpdateCourier(address) {
      if (!address || address.trim().length < 5) return;
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/search?${new URLSearchParams({
            q: address,
            format: "json",
            countrycodes: "ru",
            limit: "1",
          })}`,
          { headers: { "User-Agent": "OzonLogisticsIntegration/1.0" } },
        );
        const data = await res.json();
        if (data && data.length > 0) {
          const lat = parseFloat(data[0].lat);
          const lon = parseFloat(data[0].lon);
          console.log(`[OzonPatch] Geocoded "${address}" → ${lat}, ${lon}`);

          // Сохраняем координаты и тип доставки
          setHiddenInput("ozon_delivery_type", "courier");
          setHiddenInput("ozon_map_point_id", "");

          ozonState.deliverySelected = true;
          ozonState.deliveryType = "courier";
          updatePurchaseButton();
          updateCourierPrice(OZON_COURIER_ID, lat, lon);
        } else {
          console.warn(`[OzonPatch] Geocode failed for: "${address}"`);
          ozonState.deliverySelected = false;
          updatePurchaseButton();
        }
      } catch (e) {
        console.warn("[OzonPatch] Geocode error:", e);
      }
    }

    /**
     * Обновляет deliveryState.pickupList — merge точек без дублирования по id.
     * КРИТИЧЕСКИ ВАЖНО: showPickupInfo ищет точку в pickupList.find(e => e.id == t).
     * Без этого "окошко выбора" не появится.
     */
    function mergePickupList(delivery, newPoints) {
      const existing = delivery.deliveryState.pickupList || [];
      const map = new Map();
      for (const p of existing) map.set(String(p.id), p);
      for (const p of newPoints) map.set(String(p.id), p);
      delivery.deliveryState.pickupList = Array.from(map.values());
    }

    /**
     * Загрузка точек для текущего viewport карты.
     * Вызывается при перемещении/зуме карты.
     */
    async function loadPointsForViewport(map, delivery) {
      const zoom = map.getZoom();
      if (zoom < 10) return;

      const bounds = map.getBounds();
      const token = Symbol();
      pendingMapToken = token;

      try {
        const res = await fetch(`${BACKEND}/v1/delivery/map`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            viewport: {
              left_bottom: { lat: bounds[0][0], long: bounds[0][1] },
              right_top: { lat: bounds[1][0], long: bounds[1][1] },
            },
            zoom,
          }),
        });

        if (pendingMapToken !== token) return;
        const points = await res.json();

        // --- КРИТИЧЕСКОЕ: обновляем pickupList для showPickupInfo ---
        mergePickupList(delivery, points);

        // Обновляем autocompleteAddress для поиска по тексту
        const sb = document.getElementById("pickup-searchbox");
        if (sb) {
          const sbId = sb.getAttribute("id");
          if (!delivery.deliveryState.searchboxes[sbId])
            delivery.deliveryState.searchboxes[sbId] = {};
          // Merge — точки из разных viewport'ов
          const existing =
            delivery.deliveryState.searchboxes[sbId].autocompleteAddress || [];
          const map2 = new Map();
          for (const p of existing) map2.set(String(p.id), p);
          for (const p of points) map2.set(String(p.id), p);
          delivery.deliveryState.searchboxes[sbId].autocompleteAddress =
            Array.from(map2.values());
        }

        // Ищем ПРАВИЛЬНЫЙ wrapper — pickup-searchbox!
        // Это важно: внутри mapAddPoints → tcart__chosePointOnMap
        // вызывается n.querySelector(".searchbox-input")
        let deliveryWrapper =
          document.getElementById("pickup-searchbox") ||
          document.getElementById("customdelivery") ||
          document.querySelector(".t-radio__wrapper-delivery");

        if (!deliveryWrapper) {
          console.error("[OzonPatch] Не удалось найти контейнер доставки");
          return;
        }

        // Отключаем прыжки камеры
        const originalSetBounds = map.setBounds;
        map.setBounds = function () {
          return Promise.resolve();
        };

        // Вызываем метод Тильды для добавления точек на карту
        delivery.mapAddPoints(null, points, deliveryWrapper);

        // Возвращаем штатный метод
        setTimeout(() => {
          map.setBounds = originalSetBounds;
        }, 150);
      } catch (e) {
        console.warn("[OzonPatch] Ошибка загрузки точек:", e);
      }
    }

    waitFor(
      () => window.tcart_newDelivery,
      (delivery) => {
        // ==============================================
        // 1. ПАТЧ changePickupHandler
        // Вызывается из:
        //   - tcart__chosePointOnMap (клик на карте)
        //   - choseSearchListItemHandler (клик в выпадающем списке)
        // Заменяет сломанные патчи selectPickupPoint (#2 и #5)
        // ==============================================
        const origChangePickup = delivery.changePickupHandler;
        delivery.changePickupHandler = function (
          pointId,
          name,
          postalCode,
          wrapper,
          address,
          coords,
        ) {
          // Оригинал: обновит input value, postalCode, вызовет updateDeliveryPrice
          origChangePickup.apply(this, arguments);

          // Сохраняем Ozon map_point_id и тип доставки в hidden inputs
          setHiddenInput("ozon_map_point_id", pointId || "");
          setHiddenInput("ozon_delivery_type", "pickup");

          // Заполняем скрытые инпуты формы Тильды
          const nameInput = document.querySelector(
            '.t706 [name="tildadelivery-pickup-name"]',
          );
          const addrInput = document.querySelector(
            '.t706 [name="tildadelivery-pickup-address"]',
          );

          if (nameInput && name) {
            nameInput.value = name;
            nameInput.dispatchEvent(new Event("input", { bubbles: true }));
            nameInput.dispatchEvent(new Event("change", { bubbles: true }));
          }
          if (addrInput && address) {
            addrInput.value = address;
            addrInput.dispatchEvent(new Event("input", { bubbles: true }));
            addrInput.dispatchEvent(new Event("change", { bubbles: true }));
          }

          // Принудительно сохраняем корзину
          if (typeof window.tcart__cart_save === "function") {
            window.tcart__cart_save();
          }

          // Обновляем state
          ozonState.deliverySelected = !!pointId;
          ozonState.deliveryType = "pickup";
          updatePurchaseButton();

          // Расчёт цены Ozon
          updateOzonPrice(OZON_PICKUP_ID, pointId);
        };

        // ==============================================
        // 2. ПАТЧ ПОИСКА — changeSearchboxInputHandler
        // ==============================================
        const origSearch = delivery.changeSearchboxInputHandler;
        delivery.changeSearchboxInputHandler = function (t, r, n) {
          const input = r ? r.querySelector(".searchbox-input") : null;
          const sbId = r ? r.getAttribute("id") : null;

          // Для pickup — перехватываем поиск полностью
          if (n !== "pickup" || input?.value.trim().length < 3)
            return origSearch.apply(this, arguments);

          clearTimeout(searchDebounce);
          searchDebounce = setTimeout(() => {
            fetch(
              `${BACKEND}/v1/delivery/pvz?q=${encodeURIComponent(input.value)}`,
            )
              .then((resp) => resp.json())
              .then((data) => {
                const points = data.pvz || [];

                // Снимаем loading-состояние
                r.classList.remove("load");
                input.readOnly = false;

                if (points.length === 0) {
                  const listEl = r.querySelector(".searchbox-list");
                  if (listEl) {
                    listEl.innerHTML =
                      '<div class="searchbox-list-item t-text" style="user-select: none; pointer-events: none;">Ничего не найдено</div>';
                  }
                  return;
                }

                // --- КРИТИЧЕСКОЕ: обновляем стейт ---
                // 1. autocompleteAddress — для локальной фильтрации при следующем вводе
                if (!this.deliveryState.searchboxes[sbId])
                  this.deliveryState.searchboxes[sbId] = {};
                this.deliveryState.searchboxes[sbId].autocompleteAddress =
                  points;

                // 2. searchList — для поиска точки по id при клике
                this.searchList = points;

                // 3. pickupList — для showPickupInfo (окошко выбора)
                mergePickupList(this, points);

                // Заполняем список и навешиваем обработчики клика
                const listEl = r.querySelector(".searchbox-list");
                this.fillSearchList(listEl, points, "pickup");
                this.choseSearchListItemHandler(r, n);
              })
              .catch((err) => {
                console.warn("[OzonPatch] Search error:", err);
                r.classList.remove("load");
                input.readOnly = false;
              });
          }, 400);
        };

        // ==============================================
        // 3. ЗАГЛУШКА getPickupList
        // Чтобы Тильда не грузила ПВЗ через свой API
        // ==============================================
        delivery.getPickupList = (p) => {
          // Первый вызов при инициализации — без pattern
          if (!("pattern" in p)) {
            // Возвращаем пустой массив, чтобы рендер прошёл,
            // но сами ПВЗ будем грузить через loadPointsForViewport
            p.onDone([]);
          }
          // Вызовы с pattern (поиск) — игнорируем,
          // поиск перехвачен в патче changeSearchboxInputHandler
        };

        // ==============================================
        // 4. ПАТЧ ИНИЦИАЛИЗАЦИИ КАРТЫ
        // ==============================================
        const origMapInit = delivery.mapInit;
        delivery.mapInit = function (...args) {
          const res = origMapInit.apply(this, args);
          waitFor(
            () => window.t_delivery__map,
            (map) => {
              map.events.add("boundschange", () => {
                clearTimeout(searchDebounce);
                searchDebounce = setTimeout(
                  () => loadPointsForViewport(map, delivery),
                  700,
                );
              });
              // Первая загрузка точек
              loadPointsForViewport(map, delivery);
            },
          );
          return res;
        };

        // ==============================================
        // 5. ПРОВЕРКА ТЕЛЕФОНА
        // ==============================================
        document.body.addEventListener(
          "blur",
          async (e) => {
            if (e.target.name === "phone") {
              const phone = e.target.value.replace(/\D/g, "");
              ozonState.phoneValid = phone.length === 11;

              if (phone.length === 11) {
                try {
                  const res = await fetch(`${BACKEND}/v1/delivery/check`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ client_phone: phone }),
                  });
                  const d = await res.json();
                  ozonState.phoneChecked = d.is_possible === true;
                } catch (err) {
                  console.warn("[OzonPatch] Phone check error:", err);
                  ozonState.phoneChecked = false;
                }
              } else {
                ozonState.phoneChecked = false;
              }
              updatePurchaseButton();
            }
          },
          true,
        );

        // Сброс при вводе нового телефона
        document.body.addEventListener(
          "input",
          (e) => {
            if (e.target.name === "phone") {
              ozonState.phoneChecked = false;
              updatePurchaseButton();
            }
          },
          true,
        );

        // Блокируем кнопку при инициализации
        updatePurchaseButton();

        console.log("[OzonPatch] V4 — ПВЗ + курьер + блокировка кнопки ✓");

        // ==============================================
        // 6. КУРЬЕРСКАЯ ДОСТАВКА
        // При выборе курьерской службы и вводе адреса → геокодинг → цена
        // ==============================================

        // Отслеживаем переключение на курьерскую доставку
        function watchCourierAddress() {
          // Слушаем изменения в полях адреса курьерской доставки
          const addressSelectors = [
            'input[name="tildadelivery-address"]',
            'input[name="delivery_address"]',
            ".t-input-group_da input",
          ];

          for (const sel of addressSelectors) {
            const inputs = document.querySelectorAll(sel);
            inputs.forEach((input) => {
              if (input.dataset.ozonCourierBound) return;
              input.dataset.ozonCourierBound = "1";

              // При потере фокуса — геокодим полный адрес
              input.addEventListener("blur", () => {
                const activeService = delivery.deliveryState.selectedService;
                if (activeService !== OZON_COURIER_ID) return;

                clearTimeout(courierDebounce);
                courierDebounce = setTimeout(() => {
                  // Собираем полный адрес из полей Тильды
                  const city =
                    document.querySelector('input[name="tildadelivery-city"]')
                      ?.value || "";
                  const street =
                    document.querySelector('input[name="tildadelivery-street"]')
                      ?.value || "";
                  const house =
                    document.querySelector('input[name="tildadelivery-house"]')
                      ?.value || "";
                  const fullAddress =
                    input.value ||
                    [city, street, house].filter(Boolean).join(", ");

                  if (fullAddress.length >= 5) {
                    geocodeAndUpdateCourier(fullAddress);
                  }
                }, 500);
              });
            });
          }
        }

        // Отслеживаем переключение типа доставки (radio кнопки)
        const observer = new MutationObserver(() => {
          watchCourierAddress();
        });
        const cartContainer =
          document.querySelector(".t706") ||
          document.querySelector(".t-store__cart");
        if (cartContainer) {
          observer.observe(cartContainer, {
            childList: true,
            subtree: true,
          });
        }

        // Перехватываем выбор службы доставки
        const origSelectService = delivery.selectDeliveryService;
        if (origSelectService) {
          delivery.selectDeliveryService = function () {
            origSelectService.apply(this, arguments);

            const activeService = this.deliveryState.selectedService;
            if (activeService === OZON_COURIER_ID) {
              setHiddenInput("ozon_delivery_type", "courier");
              setHiddenInput("ozon_map_point_id", "");
              ozonState.deliverySelected = false;
              ozonState.deliveryType = "courier";
              updatePurchaseButton();
              // Попробовать геокодить уже введённый адрес
              setTimeout(() => watchCourierAddress(), 300);
            } else {
              // Переключились на ПВЗ — сбрасываем выбор
              ozonState.deliverySelected = false;
              ozonState.deliveryType = null;
              updatePurchaseButton();
            }
          };
        }
      },
    );
  })();
</script>
